name: Dependabot → Jira

on:
  pull_request:
    types: [opened, reopened, closed]
  # Manual trigger for testing — the real schedule lives in dependabot.yml
  workflow_dispatch:
    inputs:
      pr_title:
        description: "PR title (used for create)"
        default: "build(deps): bump axios from 1.6.0 to 1.7.4 in /frontend"
      pr_url:
        description: "PR URL (used for create)"
        default: "https://github.com/OwenNolis/AI-SDLC/pull/999"
      pr_number:
        description: "PR number (used for create)"
        default: "999"
      pr_body:
        description: "PR body (used for create)"
        default: "Bumps [axios](https://github.com/axios/axios) from 1.6.0 to 1.7.4."
      close_pr_number:
        description: "PR number to close Jira issue for (leave empty to run create instead)"
        default: ""

jobs:
  create-jira-issue:
    if: github.actor == 'dependabot[bot]' || (github.event_name == 'workflow_dispatch' && inputs.close_pr_number == '')
    runs-on: ubuntu-latest

    steps:
      - name: Create Jira Task for Dependabot PR
        id: create_issue
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_title || github.event.pull_request.title }}
          PR_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_url || github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
          PR_BODY: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_body || github.event.pull_request.body }}
        run: |
          echo "Using Jira email: ${JIRA_EMAIL}"
          SUMMARY="[Dependabot] ${PR_TITLE}"

          # Build the Jira issue body in Atlassian Document Format (ADF)
          PAYLOAD=$(python3 - <<PYEOF
          import json, os

          summary  = os.environ["SUMMARY"] if "SUMMARY" in os.environ else os.environ["PR_TITLE"]
          pr_url   = os.environ["PR_URL"]
          pr_num   = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          pr_body  = os.environ.get("PR_BODY", "")[:1500]  # cap to avoid oversized payloads

          payload = {
            "fields": {
              "project":     {"key": "SCRUM"},
              "summary":     f"[Dependabot] {pr_title}",
              "issuetype":   {"name": "Task"},
              "description": {
                "type": "doc", "version": 1,
                "content": [
                  {
                    "type": "paragraph",
                    "content": [
                      {"type": "text", "text": "Dependabot opened PR #" + pr_num + " to update a dependency."}
                    ]
                  },
                  {
                    "type": "paragraph",
                    "content": [
                      {"type": "text", "text": "GitHub PR: ", "marks": [{"type": "strong"}]},
                      {"type": "text", "text": pr_url,
                       "marks": [{"type": "link", "attrs": {"href": pr_url}}]}
                    ]
                  },
                  {
                    "type": "paragraph",
                    "content": [
                      {"type": "text", "text": "PR description:", "marks": [{"type": "strong"}]}
                    ]
                  },
                  {
                    "type": "codeBlock",
                    "attrs": {},
                    "content": [{"type": "text", "text": pr_body or "(no description)"}]
                  }
                ]
              }
            }
          }
          print(json.dumps(payload))
          PYEOF
          )

          RESPONSE=$(curl -s -X POST \
            "https://agentic-ai-sdlc.atlassian.net/rest/api/3/issue" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          ISSUE_KEY=$(echo "$RESPONSE" | jq -r '.key // empty')

          if [ -n "$ISSUE_KEY" ]; then
            echo "✅ Jira issue created: $ISSUE_KEY"
            ISSUE_URL="https://agentic-ai-sdlc.atlassian.net/browse/$ISSUE_KEY"
            echo "🔗 $ISSUE_URL"
            echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
            echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to create Jira issue"
            echo "Response: $RESPONSE"
            exit 1
          fi

      - name: Comment Jira link on the PR
        if: steps.create_issue.outputs.issue_key != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_KEY: ${{ steps.create_issue.outputs.issue_key }}
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\": \"🎫 Jira task created: [**${ISSUE_KEY}**](${ISSUE_URL})\"}"

  close-jira-issue:
    if: (github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]') || (github.event_name == 'workflow_dispatch' && inputs.close_pr_number != '')
    runs-on: ubuntu-latest

    steps:
      - name: Find Jira issue key from PR comment
        id: find_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.close_pr_number || github.event.pull_request.number }}
        run: |
          # Look for the comment posted by the create-jira-issue job
          COMMENT=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r 'if type == "array" then .[].body | select(startswith("🎫 Jira task created:")) else empty end')

          ISSUE_KEY=$(echo "$COMMENT" | grep -oP 'SCRUM-\d+' | head -1 || true)

          if [ -n "$ISSUE_KEY" ]; then
            echo "Found Jira issue: $ISSUE_KEY"
            echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
          else
            echo "No Jira issue found in PR comments, skipping"
          fi

      - name: Close Jira issue
        if: steps.find_issue.outputs.issue_key != ''
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.find_issue.outputs.issue_key }}
        run: |
          # Get available transitions for the issue
          TRANSITIONS=$(curl -s \
            "https://agentic-ai-sdlc.atlassian.net/rest/api/3/issue/${ISSUE_KEY}/transitions" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}")

          # Find the transition ID for "CLOSED"
          TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r '.transitions[] | select(.name == "CLOSED") | .id')

          if [ -z "$TRANSITION_ID" ]; then
            echo "❌ Could not find 'CLOSED' transition"
            echo "Available transitions: $(echo $TRANSITIONS | jq -r '.transitions[].name')"
            exit 1
          fi

          # Apply the transition
          curl -s -X POST \
            "https://agentic-ai-sdlc.atlassian.net/rest/api/3/issue/${ISSUE_KEY}/transitions" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"transition\": {\"id\": \"${TRANSITION_ID}\"}}"

          echo "✅ Jira issue ${ISSUE_KEY} closed"
