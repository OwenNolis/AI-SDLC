name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_call:
    inputs:
      FEATURE_ID:
        type: string
        required: false
      GEMINI_MODEL:
        type: string
        required: false
      SONAR_PROJECT_KEY:
        type: string
        required: false
      SONAR_ORGANIZATION:
        type: string
        required: false
      DOCKER_OWNER:
        type: string
        required: false
      DOCKER_IMAGE_BACKEND:
        type: string
        required: false
      DOCKER_IMAGE_FRONTEND:
        type: string
        required: false
    secrets:
      GEMINI_API_KEY:
        required: false
      SONAR_TOKEN:
        required: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flow:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FEATURE_ID: ${{ inputs.FEATURE_ID || vars.FEATURE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ inputs.GEMINI_MODEL || vars.GEMINI_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout AI-SDLC tools
        uses: actions/checkout@v6
        with:
          repository: OwenNolis/AI-SDLC
          path: .sdlc-tools
          sparse-checkout: |
            .github/scripts
            .github/ai-fix-config.env
            ai

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            .sdlc-tools/ai/agent/package-lock.json
            .sdlc-tools/ai/validator/package-lock.json
            frontend/package-lock.json

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: "maven"

      - name: Install AI agent dependencies
        run: npm ci
        working-directory: .sdlc-tools/ai/agent

      - name: Install validator deps
        run: npm ci
        working-directory: .sdlc-tools/ai/validator

      - name: Make scripts executable
        run: chmod +x .sdlc-tools/ai/flow.sh .sdlc-tools/ai/sync-from-fa.sh .sdlc-tools/ai/generate-tests.sh .sdlc-tools/.github/scripts/sonar-rule-details.sh .sdlc-tools/.github/scripts/sonar-pr-comment.sh

      - name: Preflight info
        run: |
          echo "Feature: ${FEATURE_ID}"
          if [ -n "${GEMINI_MODEL}" ]; then
            echo "GEMINI_MODEL=${GEMINI_MODEL}"
          else
            echo "GEMINI_MODEL not set (default will be used)"
          fi
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "❌ GEMINI_API_KEY missing"
            exit 1
          else
            echo "✅ GEMINI_API_KEY is set (hidden)"
          fi

      - name: Run one-command AI-SDLC flow (quota-safe)
        shell: bash
        run: |
          set +e

          echo "=============================================="
          echo "AI-SDLC FLOW (quota-safe wrapper)"
          echo "Feature: ${FEATURE_ID}"
          echo "Repo:    ${GITHUB_WORKSPACE}"
          echo "=============================================="

          # We capture output so we can detect quota (429) and not fail CI.
          set +e
          .sdlc-tools/ai/flow.sh "${FEATURE_ID}" 2>&1 | tee flow.log
          EXIT_CODE="${PIPESTATUS[0]}"
          set -e

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "✅ flow.sh succeeded"
            exit 0
          fi

          # If quota exceeded -> do NOT fail CI
          if grep -q "429 Too Many Requests" flow.log; then
            echo "⚠️ Gemini quota hit (429). Not failing CI for this run."
            exit 0
          fi

          echo "❌ flow.sh failed (exit code ${EXIT_CODE}). Failing CI."
          exit "$EXIT_CODE"

      # ── SonarQube Cloud Analysis ──────────────────────────────
      - name: Build backend + generate coverage for Sonar
        if: always()
        run: |
          cd backend && mvn dependency:copy-dependencies -q 2>/dev/null || true
          mvn verify -q 2>/dev/null || echo "⚠️ Backend verify for Sonar had issues (coverage may be partial)"

      - name: Run frontend tests with coverage
        if: always()
        run: |
          cd frontend && npm ci
          cd frontend && npx jest --coverage --ci 2>/dev/null || echo "⚠️ Frontend tests had issues (coverage may be partial)"

      - name: SonarQube Scan
        if: always()
        id: sonar_scan
        uses: SonarSource/sonarqube-scan-action@55e44800a8f495208cce6e4e82f5dedb45fcf0ef # v7.2.0
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.SONAR_PROJECT_KEY || vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ inputs.SONAR_ORGANIZATION || vars.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for SonarCloud processing
        if: steps.sonar_scan.outcome == 'success'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # The scanner writes a task URL we can poll
          TASK_URL=$(sed -n 's/^ceTaskUrl=//p' .scannerwork/report-task.txt 2>/dev/null)
          if [ -z "$TASK_URL" ]; then
            echo "⚠️ No CE task URL found – skipping wait"
            exit 0
          fi

          echo "⏳ Waiting for SonarCloud to finish processing..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -u "$SONAR_TOKEN:" "$TASK_URL" | jq -r '.task.status // "PENDING"')
            echo "  Attempt $i/30: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "✅ Analysis processed"; break ;;
              FAILED|CANCELED) echo "⚠️ Analysis $STATUS"; break ;;
              *) sleep 10 ;;
            esac
          done

      - name: Post Detailed Sonar Analysis on PR
        if: github.event_name == 'pull_request' && steps.sonar_scan.outcome == 'success'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ inputs.GEMINI_MODEL || vars.GEMINI_MODEL }}
        run: |
          .sdlc-tools/.github/scripts/sonar-pr-comment.sh \
            "${{ inputs.SONAR_PROJECT_KEY || vars.SONAR_PROJECT_KEY }}" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.repository }}"

      - name: Check SonarQube Quality Gate and Issues
        if: steps.sonar_scan.outcome == 'success'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY="${{ inputs.SONAR_PROJECT_KEY || vars.SONAR_PROJECT_KEY }}"
          API="https://sonarcloud.io/api/issues/search"
          QG_API="https://sonarcloud.io/api/qualitygates/project_status?projectKey=$PROJECT_KEY"

          # Check Quality Gate status
          QG_STATUS=$(curl -s -u "$SONAR_TOKEN:" "$QG_API" | jq -r '.projectStatus.status')
          echo "SonarQube Quality Gate status: $QG_STATUS"
          if [ "$QG_STATUS" != "OK" ]; then
            echo "❌ SonarQube Quality Gate failed!"
            exit 1
          fi

          # Use SonarCloud's new impact severity taxonomy (HIGH, MEDIUM — skip LOW)
          IMPACT_SEVERITIES="HIGH,MEDIUM"

          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "$API?componentKeys=$PROJECT_KEY&statuses=OPEN,CONFIRMED,REOPENED&impactSeverities=$IMPACT_SEVERITIES&ps=1")
          TOTAL=$(echo "$RESPONSE" | jq '.total // 0')

          if [ "$TOTAL" -gt 0 ]; then
            echo "❌ SonarQube reports $TOTAL open HIGH/MEDIUM issue(s):"
            curl -s -u "$SONAR_TOKEN:" \
              "$API?componentKeys=$PROJECT_KEY&statuses=OPEN,CONFIRMED,REOPENED&impactSeverities=$IMPACT_SEVERITIES&ps=10" \
              | jq -r '.issues[] | "  [\(.impacts[0].severity // .severity)] \(.message)  (\((.component // "") | split(":") | last):\(.line // "?"))"'
            echo ""
            echo "🤖 AI Code Fixes workflow will attempt to resolve these issues."
            exit 1
          else
            echo "✅ No open SonarQube issues for impact severity HIGH or MEDIUM"
          fi

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-sdlc-artifacts
          path: |
            flow.log
            backend/src/test/java/**/Feature001SupportTicketGeneratedIT.java
            frontend/src/ui/__generated__/**
            docs/technical-analysis/**
            docs/test-scenarios/**
            docs/test-context/**

      # ── Package ───────────────────────────────────────────────────
      - name: Package backend (JAR)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: mvn -DskipTests package -q
        working-directory: backend

      - name: Build frontend (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm ci && npm run build
        working-directory: frontend

      # ── Docker build & push → GHCR ────────────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ inputs.DOCKER_OWNER || vars.DOCKER_OWNER }}/${{ inputs.DOCKER_IMAGE_BACKEND || vars.DOCKER_IMAGE_BACKEND }}:latest
            ghcr.io/${{ inputs.DOCKER_OWNER || vars.DOCKER_OWNER }}/${{ inputs.DOCKER_IMAGE_BACKEND || vars.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/${{ inputs.DOCKER_OWNER || vars.DOCKER_OWNER }}/${{ inputs.DOCKER_IMAGE_FRONTEND || vars.DOCKER_IMAGE_FRONTEND }}:latest
            ghcr.io/${{ inputs.DOCKER_OWNER || vars.DOCKER_OWNER }}/${{ inputs.DOCKER_IMAGE_FRONTEND || vars.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}

      # ── Deploy ────────────────────────────────────────────────────
      - name: Deploy (Docker Compose)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DOCKER_IMAGE_BACKEND: ghcr.io/${{ inputs.DOCKER_OWNER || vars.DOCKER_OWNER }}/${{ inputs.DOCKER_IMAGE_BACKEND || vars.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
          DOCKER_IMAGE_FRONTEND: ghcr.io/${{ inputs.DOCKER_OWNER || vars.DOCKER_OWNER }}/${{ inputs.DOCKER_IMAGE_FRONTEND || vars.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
        run: |
          echo "Backend image:  $DOCKER_IMAGE_BACKEND"
          echo "Frontend image: $DOCKER_IMAGE_FRONTEND"
          docker compose pull
          docker compose up -d
          docker compose ps