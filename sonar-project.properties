# ──────────────────────────────────────────────────────────────
# SonarQube Cloud Configuration
# ──────────────────────────────────────────────────────────────

sonar.organization=owennolis
sonar.projectKey=OwenNolis_AI-SDLC
sonar.projectName=AI-SDLC

# ── Source directories ──────────────────────────────────────
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,frontend/src/setupTests.ts

# ── Java settings ───────────────────────────────────────────
sonar.java.binaries=backend/target/classes
sonar.java.source=21

# ── Coverage (JaCoCo) ──────────────────────────────────────
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# ── TypeScript / JavaScript settings ────────────────────────
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ── Encoding ────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Exclusions (generated / vendor files) ───────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/target/**,\
  **/dist/**,\
  **/*.min.js,\
  **/coverage/**,\
  ai/**,\
  docs/**,\
  **/__generated__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/setupTests.ts
